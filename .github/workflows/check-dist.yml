# In TypeScript actions, `dist/` is a special directory. When you reference
# an action with the `uses:` property, `dist/index.js` is the code that will be
# run. For this project, the `dist/index.js` file is transpiled from other
# source files. This workflow ensures the `dist/` directory contains the
# expected transpiled code.
#
# If this workflow is run from a feature branch, it will act as an additional CI
# check and fail if the checked-in `dist/` directory does not match what is
# expected from the build.
name: Check Transpiled JavaScript
on: workflow_call

permissions:
  contents: write

jobs:
  check-dist:
    name: Check dist/
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build dist/ Directory
        run: npm run bundle

      # This will fail the workflow if the `dist/` directory is different than
      # expected.
      - name: Compare Directories
        id: diff
        continue-on-error: true
        run: |
          if [ "$(git diff --ignore-space-at-eol --text dist/ | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff --ignore-space-at-eol --text dist/
            exit 1
          fi

      # If `dist` was different and this is a renovate commit, push the changes.
      - if: ${{ steps.diff.outcome == 'failure' && github.actor == 'renovate[bot]' }}
        name: Commit /dist Directory
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 #v10.0.0
        with:
          add: dist
          default_author: github_actions
          fetch: false
          message: 'Rebuild Action'
          pathspec_error_handling: exitImmediately

      # If `dist/` was different than expected, upload the expected version as a
      # workflow artifact.
      - if: ${{ steps.diff.outcome == 'failure' && github.actor != 'renovate[bot]' }}
        name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: dist
          path: dist/

      # Fail the workflow if `dist/` was different than expected.
      - if: ${{ steps.diff.outcome == 'failure' && github.actor != 'renovate[bot]' }}
        name: Fail Workflow
        run: exit 1
